# Cloudflare Pages configuration
# Deploy via GitHub integration at https://dash.cloudflare.com
# Build command: npm run build
# Build output directory: build
# Node.js version: 22+

name = "fadhil-andriawan-portfolio"
pages_build_output_dir = "build"

[build]
command = "npm run build"

[env.production]
routes = [
  { pattern = "/*", zone = "fadhil-andriawan.dev" }
]
